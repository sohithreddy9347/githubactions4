name: artifact-demo
on:
  push:
    branches:
      - main
      - dev
      - release*
  #   paths:
  #     - 'src/**'
  # pull_request:
  #   branches:
  #     - main
  #     - dev
  #     - release*
  # workflow_dispatch:
  # schedule:
  #     - cron: '0 9 * * *'
jobs:
  test:
      runs-on: ubuntu-latest
      steps:
        - name: get code
          uses: actions/checkout@v3
        - name: install dependencies
          run: npm ci
        - name: lint code
          run: npm run lint
        - name: test code
          run: npm run test
  build:
      runs-on: ubuntu-latest
      steps:
        - name: get code
          uses: actions/checkout@v3
        - name: install dependencies
          run: npm ci
        - name: build
          run: npm run build
        - name: upload build artifact
          uses: actions/upload-artifact@v4
          with:
            name: dist-files
            path: dist
  deploy:
      runs-on: ubuntu-latest
      needs: build
      steps:
         - name: get-build-artifact
           uses: actions/download-artifact@v4
           with:
            name: dist-files
         - name: list files
           run: ls -al dist
         - name: deploy
           run: echo "deploying" 
  
